<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Thi Bơi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Giải Đấu Bơi Lội Mùa Hè</h1>
            <p>Đội nào về đích trước sẽ giành chiến thắng!</p>
            <p>Lượt của: <span id="current-turn" class="team-a-turn">Đội A</span></p>
        </header>

        <div class="swimming-pool">
            <div class="track team-a-track">
                <div class="team-label">Đội A</div>
                <div class="swimmer" id="swimmer-a" style="left: 0%;">
                    <img src="media/image5.png" alt="Swimmer A">
                </div>
                <div class="finish-line">ĐÍCH</div>
            </div>
            <div class="track team-b-track">
                <div class="team-label">Đội B</div>
                <div class="swimmer" id="swimmer-b" style="left: 0%;">
                    <img src="media/image7.png" alt="Swimmer B">
                </div>
                <div class="finish-line">ĐÍCH</div>
            </div>
        </div>

        <div class="question-board">
            <h2>Chọn câu hỏi:</h2>
            <div class="question-numbers" id="question-numbers">
                <!-- Buttons will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Modal cho câu hỏi -->
    <div class="modal-overlay" id="question-modal">
        <div class="modal-content">
            <h2 id="modal-title">Câu hỏi 1</h2>
            <p id="modal-question">Nội dung câu hỏi ở đây?</p>
            <div class="answers" id="modal-answers">
                <!-- Answer buttons will be generated here -->
            </div>
        </div>
    </div>

    <!-- Modal thông báo kết quả (Đúng/Sai hoặc Chiến thắng) -->
    <div class="modal-overlay" id="result-modal">
        <div class="modal-content result-content">
            <h2 id="result-title">Thông báo</h2>
            <p id="result-message">Nội dung thông báo</p>
            <button id="btn-next" class="btn">Tiếp tục</button>
            <button id="btn-restart" class="btn hidden">Chơi lại</button>
        </div>
    </div>

    <!-- Âm thanh (nếu có thể sử dụng các file trong thư mục media) -->
    <!-- Sẽ tạo audio động trong JS -->

    <script src="script.js"></script>
</body>
</html>
